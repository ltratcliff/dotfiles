general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after sleep.
}

listener {
    timeout = 300                                # 5 mins
    on-timeout = loginctl lock-session           # lock screen when timeout has passed
}

listener {
    timeout = 330                                # 5.5 mins
    on-timeout = hyprctl dispatch dpms off       # turn off monitor
    on-resume = hyprctl dispatch dpms on         # turn on monitor
}

# This is the lid-specific trigger
listener {
    timeout = 0
    on-timeout = if pgrep hypridle; then systemctl suspend; fi
}
